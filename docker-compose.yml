version: "3.9"

x-common-env: &common-env
  MONGO_URI: ${MONGO_URI}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  OLLAMA_URL: ${OLLAMA_URL}
  REDIS_URL: ${REDIS_URL}
  PARSING_SERVICE_URL: "http://parsing-service:5001"
  COMPATIBILITY_SERVICE_URL: "http://compatibility-service:5002"
  KNOWLEDGE_SERVICE_URL: "http://knowledge-service:5003"
  REPORT_SERVICE_URL: "http://report-service:5004"
  WORKER_URL: "http://worker:5005"
  ANONYMIZED_TELEMETRY: ${ANONYMIZED_TELEMETRY}
  PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: ${PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION}
  FLASK_ENV: ${FLASK_ENV}
  GEMINI_MODEL: ${GEMINI_MODEL}
  TRUSTED_HOSTS: "docker.itspectrum.fr,docker.itspectrum.fr:5001,parsing-service,parsing-service:5001,compatibility-service,compatibility-service:5002,knowledge-service,knowledge-service:5003,report-service,report-service:5004,worker,worker:5005,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000"
  DEBUG: ${DEBUG}

services:

  gateway:
    build:
      context: .
      target: gateway
    container_name: gateway
    ports:
      - "88:5000"
    environment:
      <<: *common-env
      PORT: 5000
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  parsing_service:
    build:
      context: .
      target: parsing_service
    container_name: parsing_service
    ports:
      - "5001:5001"
    environment:
      <<: *common-env
      PORT: 5001
    networks:
      default:
        aliases:
          - parsing-service
          - parsing_service
    depends_on:
      - mongodb
    restart: unless-stopped

  compatibility_service:
    build:
      context: .
      target: compatibility_service
    container_name: compatibility_service
    ports:
      - "5002:5002"
    environment:
      <<: *common-env
      PORT: 5002
    networks:
      default:
        aliases:
          - compatibility-service
          - compatibility_service
    depends_on:
      - mongodb
      - knowledge_service
    restart: unless-stopped

  knowledge_service:
    build:
      context: .
      dockerfile: knowledge_service/Dockerfile
    container_name: knowledge_service
    ports:
      - "5003:5003"
    environment:
      <<: *common-env
      PORT: 5003
    networks:
      default:
        aliases:
          - knowledge-service
          - knowledge_service
    volumes:
      - knowledge_chroma_data:/app/knowledge_service/chroma_db
    depends_on:
      - mongodb
    restart: unless-stopped

  report_service:
    build:
      context: .
      target: report_service
    container_name: report_service
    ports:
      - "5004:5004"
    volumes:
      - report_generated_files:/app/report_service/generated_reports
    environment:
      <<: *common-env
      PORT: 5004
    networks:
      default:
        aliases:
          - report-service
          - report_service
    depends_on:
      - mongodb
      - knowledge_service
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    container_name: worker
    ports:
      - "5005:5005"
    environment:
      <<: *common-env
      PORT: 5005
    depends_on:
      - redis
      - mongodb
      - parsing_service
      - compatibility_service
      - report_service
    restart: unless-stopped

  mongodb:
    image: mongo:6
    container_name: mongo_db
    # ports:
    #   - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      default:
        aliases:
          - mongodb
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes 
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongo_express:
    image: mongo-express:latest
    container_name: mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: spectrum_admin
      ME_CONFIG_BASICAUTH_PASSWORD: AnasSuperMotDePasseWeb123
    depends_on:
      - mongodb
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    expose:
      - "11434"
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1 
    restart: unless-stopped

volumes:
  mongo_data:
    external: false
    name: jira_migration_mongo_data
  ollama_data:
    external: false
    name: jira_migration_ollama_data
  redis_data:
    external: false
    name: jira_migration_redis_data
  knowledge_chroma_data:
    external: false
    name: jira_migration_knowledge_chroma_data
  report_generated_files:
    external: false
    name: jira_migration_report_generated_files